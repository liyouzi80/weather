<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1c1c1e;
    display: flex; gap: 24px; flex-wrap: wrap;
    justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  }
  .widget {
    border-radius: 22px;
    background: linear-gradient(180deg, #0b1426 0%, #080d18 55%, #05080f 100%);
    color: #f5f5f7;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    overflow: hidden;
  }
  .medium { width: 364px; height: 170px; padding: 18px 20px 16px; }
  .small { width: 170px; height: 170px; padding: 14px; }

  .city { color: #98989d; font-weight: 600; }
  .medium .city { font-size: 18px; }
  .small .city { font-size: 14px; }
  .emoji { line-height: 1; }
  .medium .emoji { font-size: 40px; margin: 6px 0 2px; }
  .small .emoji { font-size: 28px; margin: 4px 0 2px; }
  .big { font-weight: 700; letter-spacing: -0.02em; }
  .medium .big { font-size: 56px; }
  .small .big { font-size: 42px; }
  .hilo { display: flex; gap: 22px; margin-top: 10px; }
  .small .hilo { gap: 12px; margin-top: 8px; }
  .hl .lab { color: #6e6e73; }
  .hl .val { font-weight: 600; }
  .medium .hl { font-size: 14px; } .medium .hl .val { font-size: 16px; }
  .small .hl { font-size: 11px; } .small .hl .val { font-size: 12px; }
  .hot { color: #ff453a; } .cold { color: #40c8e0; }
  .footer { color: #6e6e73; margin-top: auto; padding-top: 10px; }
  .medium .footer { font-size: 10px; } .small .footer { font-size: 9px; }

  #ctl {
    position: fixed; top: 16px; left: 16px;
    background: #2c2c2e; border-radius: 12px; padding: 12px 16px;
    display: flex; gap: 8px; z-index: 10;
  }
  #ctl button {
    background: #48484a; color: #f5f5f7; border: none; border-radius: 8px;
    padding: 6px 14px; font-size: 13px; cursor: pointer; font-family: inherit;
  }
  #ctl button.active { background: #0a84ff; }
</style>
</head>
<body>

<div id="ctl">
  <button onclick="load('panyu')" class="active">番禺</button>
  <button onclick="load('anfu')">安福</button>
</div>

<div class="widget medium" id="w-medium"></div>
<div class="widget small" id="w-small"></div>

<script>
const API = 'https://weather-8za.pages.dev/api/widget';

function emoji(t) {
  if (!t) return '☁️';
  if (/雷/.test(t)) return '⛈️';
  if (/雪/.test(t)) return '🌨️';
  if (/雨/.test(t)) return '🌧️';
  if (/雾|霾|沙|尘/.test(t)) return '🌫️';
  if (/阴/.test(t)) return '☁️';
  if (/多云|间/.test(t)) return '⛅️';
  if (/晴/.test(t)) return '☀️';
  return '☁️';
}
const r = (v) => v == null ? '—' : Math.round(v) + '°';

async function load(type) {
  document.querySelectorAll('#ctl button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const c = type === 'panyu'
    ? { lat: 22.9468, lon: 113.3622, name: '番禺区', cityName: '番禺' }
    : { lat: 27.3954, lon: 114.6195, name: '安福县', cityName: '安福' };
  try {
    const res = await fetch(`${API}?lat=${c.lat}&lon=${c.lon}&name=${encodeURIComponent(c.name)}&cityName=${encodeURIComponent(c.cityName)}`);
    render(await res.json());
  } catch (e) {
    document.getElementById('w-medium').innerHTML = '<div class="big">—°</div>';
  }
}

function card(data, cls) {
  const avg = data.avg != null ? data.avg : data.median;
  const time = data.updatedAt
    ? new Date(data.updatedAt).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
    : '—';
  const hi = cls === 'small' ? '高' : '最高';
  const lo = cls === 'small' ? '低' : '最低';
  return `
    <div class="city">${data.city}</div>
    <div class="emoji">${emoji(data.text)}</div>
    <div class="big">${avg != null ? Number(avg).toFixed(1) + '°' : '—'}</div>
    <div class="hilo">
      <span class="hl"><span class="lab">${hi} </span><span class="val hot">${r(data.max)}</span></span>
      <span class="hl"><span class="lab">${lo} </span><span class="val cold">${r(data.min)}</span></span>
    </div>
    <div class="footer">更新 ${time}</div>`;
}

function render(data) {
  document.getElementById('w-medium').innerHTML = card(data, 'medium');
  document.getElementById('w-small').innerHTML = card(data, 'small');
}

load('panyu');
</script>
</body>
</html>
