<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget Preview - Medium</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1c1c1e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  }

  /* Medium widget: 364×170pt */
  .widget {
    width: 364px;
    height: 170px;
    border-radius: 22px;
    background: linear-gradient(180deg, #050810 0%, #0c1526 50%, #080e18 100%);
    padding: 14px 16px 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: #f5f5f7;
  }

  /* 顶部：城市 + 天气（左） / 中位温度（右） */
  .header {
    display: flex;
    flex-direction: row;
    align-items: baseline;
    gap: 8px;
  }
  .city { font-size: 18px; font-weight: 600; white-space: nowrap; }
  .weather { font-size: 14px; font-weight: 400; color: #98989d; white-space: nowrap; }
  .median { margin-left: auto; font-size: 36px; font-weight: 700; line-height: 1; }

  /* 副标题 */
  .sub {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    font-size: 11px;
    color: #6e6e73;
    margin-top: 2px;
  }

  /* 两列网格 */
  .grid { display: flex; flex-direction: row; gap: 14px; margin-top: 11px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .col.a { width: 150px; }
  .col.b { flex: 1; }

  .provider { display: flex; align-items: center; gap: 5px; }
  .dot { font-size: 7px; flex-shrink: 0; }
  .name { font-size: 13px; color: #f5f5f7; white-space: nowrap; }
  .p-temp { font-size: 14px; font-weight: 600; white-space: nowrap; margin-left: auto; }

  .hot { color: #ff453a; }
  .cold { color: #40c8e0; }
  .dim { color: #6e6e73; }

  .footer {
    font-size: 10px;
    color: #6e6e73;
    text-align: center;
    margin-top: auto;
    padding-top: 8px;
  }

  #data-ctl {
    position: fixed; top: 16px; left: 16px;
    background: #2c2c2e; border-radius: 12px; padding: 12px 16px;
    display: flex; gap: 8px; z-index: 10;
  }
  #data-ctl button {
    background: #48484a; color: #f5f5f7; border: none; border-radius: 8px;
    padding: 6px 14px; font-size: 13px; cursor: pointer; font-family: inherit;
  }
  #data-ctl button.active { background: #0a84ff; }
</style>
</head>
<body>

<div id="data-ctl">
  <button onclick="load('panyu')" class="active">番禺</button>
  <button onclick="load('anfu')">安福</button>
</div>

<div class="widget" id="widget">
  <div class="header">
    <span class="city" id="city">—</span>
    <span class="weather" id="weather">—</span>
    <span class="median" id="median">—°</span>
  </div>
  <div class="sub">
    <span id="count">— 个信源</span>
    <span id="range"></span>
  </div>
  <div class="grid">
    <div class="col a" id="colA"></div>
    <div class="col b" id="colB"></div>
  </div>
  <div class="footer" id="footer">更新 —</div>
</div>

<script>
const API = 'https://weather-8za.pages.dev/api/widget';
const PC = {
  'nmc': '#ef4444', 'gzqx': '#a855f7', 'qweather': '#3b82f6',
  'caiyun': '#f59e0b', 'owm': '#f97316', 'open-meteo': '#22c55e',
};
const SHORT = {
  'nmc': '中央气象台', 'gzqx': '番禺气象台', 'qweather': '和风天气',
  'caiyun': '彩云天气', 'owm': 'OWM', 'open-meteo': 'Open-Meteo',
};

async function load(type) {
  document.querySelectorAll('#data-ctl button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  let lat, lon, name, cityName;
  if (type === 'panyu') {
    lat = 22.9468; lon = 113.3622; name = '番禺'; cityName = '番禺';
  } else {
    lat = 27.3954; lon = 114.6195; name = '安福'; cityName = '安福';
  }

  try {
    const res = await fetch(`${API}?lat=${lat}&lon=${lon}&name=${name}&cityName=${cityName}`);
    render(await res.json());
  } catch (e) {
    document.getElementById('city').textContent = 'Error';
    document.getElementById('median').textContent = '—°';
  }
}

function render(data) {
  const multi = data.count >= 2 && data.max !== data.min;

  document.getElementById('city').textContent = data.city;
  document.getElementById('weather').textContent = data.text || '';
  document.getElementById('median').textContent = (data.median != null ? Math.round(data.median) : '—') + '°';
  document.getElementById('count').textContent = data.count + ' 个信源';
  document.getElementById('range').textContent = multi ? `${Math.round(data.max)}° / ${Math.round(data.min)}°` : '';

  const time = data.updatedAt
    ? new Date(data.updatedAt).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
    : '—';
  document.getElementById('footer').textContent = '更新 ' + time;

  const colA = document.getElementById('colA');
  const colB = document.getElementById('colB');
  colA.innerHTML = '';
  colB.innerHTML = '';
  const half = Math.ceil(data.providers.length / 2);

  data.providers.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'provider';

    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.color = PC[p.id] || '#6e6e73';
    dot.textContent = '●';

    const name = document.createElement('span');
    name.className = 'name';
    name.textContent = SHORT[p.id] || p.name;
    if (p.error) name.classList.add('dim');

    const temp = document.createElement('span');
    temp.className = 'p-temp';
    if (p.error) {
      temp.textContent = '—';
      temp.classList.add('dim');
    } else {
      temp.textContent = Math.round(p.temp) + '°';
      if (multi && p.temp === data.max) temp.classList.add('hot');
      else if (multi && p.temp === data.min) temp.classList.add('cold');
    }

    row.appendChild(dot);
    row.appendChild(name);
    row.appendChild(temp);
    (i < half ? colA : colB).appendChild(row);
  });
}

load('panyu');
</script>
</body>
</html>
