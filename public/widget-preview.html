<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget Preview - Medium</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1c1c1e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  }

  /* Medium widget: 364×170pt, rendered at 2x for retina */
  .widget {
    width: 364px;
    height: 170px;
    border-radius: 22px;
    background: linear-gradient(180deg, #050810 0%, #0c1526 50%, #080e18 100%);
    padding: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .root {
    display: flex;
    flex-direction: row;
    gap: 12px;
    flex: 1;
  }

  /* Left panel: 160pt */
  .left {
    width: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .city {
    font-size: 16px;
    font-weight: 600;
    color: #f5f5f7;
    line-height: 1.2;
  }

  .temp {
    font-size: 34px;
    font-weight: 700;
    color: #f5f5f7;
    line-height: 1.1;
    margin: 8px 0;
  }

  .weather {
    font-size: 13px;
    font-weight: 500;
    color: #98989d;
    line-height: 1.2;
  }

  /* Right panel: 160pt */
  .right {
    width: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
  }

  .right-header {
    font-size: 11px;
    color: #6e6e73;
    margin-bottom: 4px;
  }

  .provider {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .dot {
    font-size: 6px;
    flex-shrink: 0;
  }

  .name {
    font-size: 12px;
    color: #f5f5f7;
    white-space: nowrap;
    flex: 1;
  }

  .p-temp {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    margin-left: auto;
  }

  .hot { color: #ff453a; }
  .cold { color: #40c8e0; }
  .dim { color: #6e6e73; }

  .footer {
    font-size: 10px;
    color: #6e6e73;
    text-align: center;
    padding-top: 8px;
  }

  #data-ctl {
    position: fixed;
    top: 16px;
    left: 16px;
    background: #2c2c2e;
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }

  #data-ctl button {
    background: #48484a;
    color: #f5f5f7;
    border: none;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }

  #data-ctl button.active {
    background: #0a84ff;
  }
</style>
</head>
<body>

<div id="data-ctl">
  <button onclick="load('panyu')" class="active">番禺</button>
  <button onclick="load('anfu')">安福</button>
</div>

<div class="widget" id="widget">
  <div class="root">
    <div class="left">
      <div class="city" id="city">—</div>
      <div class="temp" id="temp">—°</div>
      <div class="weather" id="weather">—</div>
    </div>
    <div class="right">
      <div class="right-header" id="count">— 个信源</div>
      <div id="providers"></div>
    </div>
  </div>
  <div class="footer dim" id="footer">更新 —</div>
</div>

<script>
const API = 'https://weather-8za.pages.dev/api/widget';
const PC = {
  'nmc': '#ef4444', 'gzqx': '#a855f7', 'qweather': '#3b82f6',
  'caiyun': '#f59e0b', 'owm': '#f97316', 'open-meteo': '#22c55e',
};
const SHORT = {
  'nmc': '中央气象台', 'gzqx': '番禺气象台', 'qweather': '和风天气',
  'caiyun': '彩云天气', 'owm': 'OWM', 'open-meteo': 'Open-Meteo',
};

async function load(type) {
  document.querySelectorAll('#data-ctl button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  let lat, lon, name, cityName;
  if (type === 'panyu') {
    lat = 22.9468; lon = 113.3622; name = '番禺'; cityName = '番禺';
  } else {
    lat = 27.3954; lon = 114.6195; name = '安福'; cityName = '安福';
  }

  try {
    const res = await fetch(`${API}?lat=${lat}&lon=${lon}&name=${name}&cityName=${cityName}`);
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('city').textContent = 'Error';
    document.getElementById('temp').textContent = '—°';
  }
}

function render(data) {
  const multi = data.count >= 2 && data.max !== data.min;

  document.getElementById('city').textContent = data.city;
  document.getElementById('temp').textContent = (data.median != null ? Math.round(data.median) : '—') + '°';
  document.getElementById('weather').textContent = data.text || '';
  document.getElementById('count').textContent = data.count + ' 个信源';

  const time = data.updatedAt
    ? new Date(data.updatedAt).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
    : '—';
  document.getElementById('footer').textContent = '更新 ' + time;

  const container = document.getElementById('providers');
  container.innerHTML = '';

  for (const p of data.providers) {
    const row = document.createElement('div');
    row.className = 'provider';

    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.color = PC[p.id] || '#6e6e73';
    dot.textContent = '●';

    const name = document.createElement('span');
    name.className = 'name';
    name.textContent = SHORT[p.id] || p.name;

    const temp = document.createElement('span');
    temp.className = 'p-temp';
    if (p.error) {
      temp.textContent = '—';
      temp.classList.add('dim');
    } else {
      const t = Math.round(p.temp);
      temp.textContent = t + '°';
      if (multi && p.temp === data.max) temp.classList.add('hot');
      else if (multi && p.temp === data.min) temp.classList.add('cold');
    }

    row.appendChild(dot);
    row.appendChild(name);
    row.appendChild(temp);
    container.appendChild(row);
  }
}

load('panyu');
</script>
</body>
</html>
