name: TianQi
schemes:
  TianQi:
    build:
      targets:
        TianQi: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "27"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: YES

targets:
  TianQi:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Sources
    dependencies:
      - target: TianQiWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.tianqi
        PRODUCT_NAME: 天气
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPAD: NO
        INFOPLIST_FILE: Sources/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        DEVELOPMENT_TEAM: ""
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: 天气
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        NSLocationWhenInUseUsageDescription: 用于显示当前位置的天气
        # 番禺气象台 tqyb.com.cn 和中国天气网 d1.weather.com.cn 均为 HTTP，需放行明文加载
        NSAppTransportSecurity:
          NSExceptionDomains:
            tqyb.com.cn:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
            d1.weather.com.cn:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true

  TianQiWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    # 复用主 App 的数据层（纯 Foundation + 直抓信源，无后端），仅 Views/ViewModels/Effects 不参与
    sources:
      - Widget
      - Sources/Models
      - Sources/Services
      - Sources/Utils
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.tianqi.widget
        PRODUCT_NAME: TianQiWidget
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: Widget/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        DEVELOPMENT_TEAM: ""
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: 天气
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSAppTransportSecurity:
          NSExceptionDomains:
            tqyb.com.cn:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
            d1.weather.com.cn:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
